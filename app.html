<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Taxes — Via Pública</title>
  <meta name="theme-color" content="#2f7548">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* =============================================
       DS THEME OVERRIDE — Via Pública DS v2
    ============================================= */
    :root {
      --primary:       #2f7548;
      --primary-hover: #245c39;
      --primary-press: #1c462c;
      --primary-bg:    #eef6ef;
      --primary-light: #d6e8d9;
      --bg-primary:    #faf8f3;
      --bg-secondary:  #f3efe5;
      --bg-tertiary:   #ebe7db;
      --border-color:  #d6d0bf;
      --text-main:     #111110;
      --text-muted:    #5f5b50;
      --accent-blue:        #2f7548;
      --accent-blue-hover:  #245c39;
      --accent-orange:      #b45309;
      --accent-orange-hover:#92400e;
      --accent-green:       #2f7548;
      --accent-purple:      #6d28d9;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.10), 0 1px 2px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.12), 0 2px 4px rgba(0,0,0,0.06);
      --shadow-lg: 0 10px 24px rgba(0,0,0,0.14), 0 4px 8px rgba(0,0,0,0.06);
      --glass-bg:     rgba(250,248,243,0.96);
      --glass-border: rgba(47,117,72,0.18);
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 14px;
      --font-sans: 'IBM Plex Sans', -apple-system, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'IBM Plex Mono', Consolas, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: var(--font-sans);
      background: var(--bg-secondary);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
    }

    .app-header {
      flex-shrink: 0;
      background: var(--primary);
      color: white;
      height: 52px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--primary-hover);
      box-shadow: var(--shadow-sm);
      z-index: 100;
    }
    .app-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .back-link {
      display: flex;
      align-items: center;
      gap: 5px;
      color: rgba(255,255,255,0.82);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.10);
      transition: background 120ms;
    }
    .back-link:hover { background: rgba(255,255,255,0.22); color: white; }
    .back-link svg { width: 13px; height: 13px; }
    .header-divider {
      width: 1px;
      height: 20px;
      background: rgba(255,255,255,0.25);
    }
    .app-title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }
    .app-title span { opacity: 0.7; font-weight: 400; font-size: 13px; margin-left: 8px; }
    .header-badge {
      font-size: 11px;
      font-weight: 500;
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.26);
      color: white;
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: 10px;
    }

    .app-main {
      flex: 1;
      overflow: hidden;
      display: flex;
    }
    .app-main iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="app-header-left">
      <a href="index.html" class="back-link">
        <i data-lucide="chevron-left"></i>
        Tornar
      </a>
      <div class="header-divider"></div>
      <h1 class="app-title">Calculadora de Taxes <span>Via Pública</span></h1>
      <span class="header-badge">v0.1.0</span>
    </div>
    <div class="app-header-right">
      <!-- Future controls -->
    </div>
  </header>

  <main class="app-main">
    <iframe src="calculadora_taxes_3jul.html" title="Calculadora de Taxes"></iframe>
  </main>

  <script>
    lucide.createIcons();
  </script>
</body>
</html>
