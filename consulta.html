<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta IA — Via Pública Sabadell</title>
  <meta name="theme-color" content="#2f7548">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --primary:       #2f7548;
      --primary-hover: #245c39;
      --primary-press: #1c462c;
      --primary-bg:    #eef6ef;
      --primary-light: #d6e8d9;
      --bg-primary:    #faf8f3;
      --bg-secondary:  #f3efe5;
      --bg-tertiary:   #ebe7db;
      --border-color:  #d6d0bf;
      --text-main:     #111110;
      --text-muted:    #5f5b50;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.10), 0 1px 2px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.12), 0 2px 4px rgba(0,0,0,0.06);
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 14px;
      --font-sans: 'IBM Plex Sans', -apple-system, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'IBM Plex Mono', Consolas, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: var(--font-sans);
      background: var(--bg-secondary);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .app-header {
      flex-shrink: 0;
      background: var(--primary);
      color: white;
      height: 52px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--primary-hover);
      box-shadow: var(--shadow-sm);
    }
    .app-header-left { display: flex; align-items: center; gap: 12px; }
    .back-link {
      display: flex; align-items: center; gap: 5px;
      color: rgba(255,255,255,0.82); text-decoration: none;
      font-size: 13px; font-weight: 500;
      padding: 4px 10px; border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.10);
      transition: background 120ms;
    }
    .back-link:hover { background: rgba(255,255,255,0.22); color: white; }
    .back-link svg { width: 13px; height: 13px; }
    .header-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.25); }
    .app-title { font-size: 16px; font-weight: 600; letter-spacing: 0.01em; }
    .app-title span { opacity: 0.7; font-weight: 400; font-size: 13px; margin-left: 8px; }
    .header-badge {
      font-size: 11px; font-weight: 500;
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.26);
      color: white; padding: 2px 8px; border-radius: 10px; margin-left: 10px;
    }

    /* ── Layout ── */
    .chat-layout {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
      padding: 0;
      overflow: hidden;
    }

    /* ── Missatges ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 5px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 88%;
    }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.assistant { align-self: flex-start; align-items: flex-start; }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: var(--radius-lg);
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .msg.user .msg-bubble {
      background: var(--primary);
      color: white;
      border-bottom-right-radius: var(--radius-sm);
    }
    .msg.assistant .msg-bubble {
      background: var(--bg-primary);
      color: var(--text-main);
      border: 1px solid var(--border-color);
      border-bottom-left-radius: var(--radius-sm);
      box-shadow: var(--shadow-sm);
    }
    .msg.assistant .msg-bubble strong { font-weight: 700; color: var(--primary); }
    .msg-time {
      font-size: 10px; color: var(--text-muted);
      margin-top: 4px; padding: 0 4px;
    }

    /* Missatge benvinguda */
    .welcome-card {
      background: var(--primary-bg);
      border: 1px solid var(--primary-light);
      border-radius: var(--radius-lg);
      padding: 20px;
      text-align: center;
      margin: 8px 0 4px;
    }
    .welcome-card .wc-icon {
      width: 40px; height: 40px;
      background: var(--primary);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 12px;
      color: white;
    }
    .welcome-card h2 { font-size: 16px; font-weight: 700; color: var(--primary); margin-bottom: 6px; }
    .welcome-card p { font-size: 13px; color: var(--text-muted); line-height: 1.5; }

    /* Suggeriments ràpids */
    .suggestions {
      display: flex; flex-wrap: wrap; gap: 8px;
      padding: 0 20px 12px;
      flex-shrink: 0;
    }
    .suggestion-btn {
      font-family: var(--font-sans);
      font-size: 12px; font-weight: 500;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--primary-light);
      background: var(--primary-bg);
      color: var(--primary);
      cursor: pointer;
      transition: background 120ms, border-color 120ms;
    }
    .suggestion-btn:hover { background: var(--primary-light); border-color: var(--primary); }

    /* ── Tipejant ── */
    .typing-indicator {
      display: flex; align-items: center; gap: 5px;
      padding: 10px 14px;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      border-bottom-left-radius: var(--radius-sm);
      box-shadow: var(--shadow-sm);
      align-self: flex-start;
      display: none;
    }
    .typing-dot {
      width: 7px; height: 7px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* ── Input ── */
    .chat-input-bar {
      flex-shrink: 0;
      padding: 12px 20px 16px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-color);
    }
    .input-row {
      display: flex; gap: 8px; align-items: flex-end;
      background: var(--bg-primary);
      border: 1.5px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 8px 8px 8px 14px;
      box-shadow: var(--shadow-sm);
      transition: border-color 150ms;
    }
    .input-row:focus-within { border-color: var(--primary); }
    #chat-input {
      flex: 1;
      font-family: var(--font-sans);
      font-size: 14px;
      border: none;
      outline: none;
      background: transparent;
      resize: none;
      min-height: 22px;
      max-height: 120px;
      line-height: 1.5;
      color: var(--text-main);
    }
    #chat-input::placeholder { color: var(--text-muted); }
    #send-btn {
      flex-shrink: 0;
      width: 36px; height: 36px;
      border-radius: var(--radius-md);
      border: none;
      background: var(--primary);
      color: white;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 120ms;
    }
    #send-btn:hover { background: var(--primary-hover); }
    #send-btn:disabled { background: var(--border-color); cursor: not-allowed; }
    #send-btn svg { width: 16px; height: 16px; }
    .input-hint {
      font-size: 11px; color: var(--text-muted);
      text-align: center; margin-top: 6px;
    }
  </style>
</head>
<body>

  <header class="app-header">
    <div class="app-header-left">
      <a href="index.html" class="back-link">
        <i data-lucide="chevron-left"></i>
        Tornar
      </a>
      <div class="header-divider"></div>
      <span class="app-title">Consulta IA <span>Via Pública · Sabadell</span></span>
      <span class="header-badge">Gemini</span>
    </div>
  </header>

  <div class="chat-layout">
    <div class="chat-messages" id="chat-messages">
      <div class="welcome-card">
        <div class="wc-icon"><i data-lucide="bot" style="width:20px;height:20px;"></i></div>
        <h2>Copilot Via Pública</h2>
        <p>Consulta normatives, ordenances i criteris tècnics d'obres i ocupació de la via pública de Sabadell.</p>
      </div>
    </div>

    <div class="typing-indicator" id="typing-indicator">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>

    <div class="suggestions" id="suggestions">
      <button class="suggestion-btn" onclick="sendSuggestion(this)">Taxes terrassa vetlladors 2026</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">Elements auxiliars d'obra: documentació</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">Tall de carrer: requisits i comunicació</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">Categories fiscals carrers Sabadell</button>
    </div>

    <div class="chat-input-bar">
      <div class="input-row">
        <textarea id="chat-input" rows="1" placeholder="Escriu la teva consulta..."></textarea>
        <button id="send-btn" onclick="sendMessage()" title="Enviar">
          <i data-lucide="send"></i>
        </button>
      </div>
      <div class="input-hint">Enter per enviar · Shift+Enter per nova línia</div>
    </div>
  </div>

  <script>
    lucide.createIcons();

    const API_URL = '/api/gemini';
    let messages = [];
    let isLoading = false;

    const chatMessages = document.getElementById('chat-messages');
    const typingIndicator = document.getElementById('typing-indicator');
    const suggestions = document.getElementById('suggestions');
    const input = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');

    // Auto-resize textarea
    input.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    function now() {
      return new Date().toLocaleTimeString('ca-ES', { hour: '2-digit', minute: '2-digit' });
    }

    function addMessage(role, text) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;

      // Convertir **negreta** a <strong>
      const formatted = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

      div.innerHTML = `<div class="msg-bubble">${formatted}</div><div class="msg-time">${now()}</div>`;
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      return div;
    }

    function showTyping(show) {
      typingIndicator.style.display = show ? 'flex' : 'none';
      if (show) chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function sendSuggestion(btn) {
      input.value = btn.textContent;
      suggestions.style.display = 'none';
      sendMessage();
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text || isLoading) return;

      suggestions.style.display = 'none';
      isLoading = true;
      sendBtn.disabled = true;
      input.value = '';
      input.style.height = 'auto';

      addMessage('user', text);
      messages.push({ role: 'user', content: text });

      showTyping(true);

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages })
        });

        const data = await res.json();
        showTyping(false);

        const reply = data.reply || data.error || 'Error desconegut.';
        addMessage('assistant', reply);
        messages.push({ role: 'assistant', content: reply });

      } catch (err) {
        showTyping(false);
        addMessage('assistant', 'Error de connexió. Comprova que estàs connectat i torna-ho a intentar.');
      }

      isLoading = false;
      sendBtn.disabled = false;
      input.focus();
    }
  </script>
</body>
</html>
